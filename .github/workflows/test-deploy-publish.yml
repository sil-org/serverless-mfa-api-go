name: Test, Deploy, Publish

on:
  push:
    branches: [ '**' ]
    tags: [ 'v*' ]
    paths-ignore:
    - 'terraform/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write
  packages: write

jobs:
  tests:
    name: Tests
    runs-on: ubuntu-latest
    env:
      AWS_REGION: us-east-1
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Test
        run: docker compose run app go test ./...

  lint:
    name: Lint and Vulnerability Scan
    runs-on: ubuntu-latest
    timeout-minutes: ${{ fromJSON(vars.DEFAULT_JOB_TIMEOUT_MINUTES) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          check-latest: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.10.1

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  deploy:
    name: Deploy to AWS Lambda
    needs: [ 'tests', 'lint' ]
    if: github.ref_name == 'main' || startsWith(github.ref, 'refs/tags/')
    environment:
      name: ${{ startsWith(github.ref, 'refs/tags/') && 'prod' || 'dev' }}
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-${{ github.ref }}-${{ matrix.region }}
      cancel-in-progress: false
    strategy:
      matrix:
        region: [ us-east-1, us-west-2 ]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install AWS CDK
        run: npm install -g aws-cdk

      - uses: aws-actions/configure-aws-credentials@v6
        id: configure-aws
        with:
          aws-region: ${{ matrix.region }}
          role-to-assume: ${{ vars.AWS_CD_ROLE_ARN }}

      - name: Build
        run: CGO_ENABLED=0 go build -tags lambda.norpc -ldflags="-s -w" -o bootstrap ./lambda

      - name: CDK Deploy
        env:
          AWS_REGION: ${{ matrix.region }}
          ENVIRONMENT: ${{ vars.STAGE }}
          LAMBDA_ROLE: ${{ vars.LAMBDA_ROLE }}
          API_KEY_TABLE: ${{ vars.API_KEY_TABLE }}
          TOTP_TABLE: ${{ vars.TOTP_TABLE }}
          WEBAUTHN_TABLE: ${{ vars.WEBAUTHN_TABLE }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          AWS_ACCOUNT_ID: ${{ steps.configure-aws.outputs.aws-account-id }}
        run: cd cdk && cdk deploy --require-approval never

  build-and-publish:
    name: Build and Publish
    needs: [ 'tests', 'lint' ]
    if: github.ref_name == 'main' || startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major.minor}}
            type=semver,pattern={{major}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
